[package]
name = "zeno-gateway"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Api-Gateway for ZenoWallet"

[dependencies]
axum = "0.8.4"
axum-server = { version = "0.7.2", features = ["tls-rustls"] }
http = "1.3.1"

reqwest = { version = "0.12.22", features = ["json","brotli","gzip","http2","rustls-tls"], default-features = false }
rustls = { version = "0.23.31", features = ["ring","logging","tls12"], default-features = false }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.142"
tokio = { version = "1.46.1", features = ["full"] }
tokio-rustls = "0.26.2"
tower = { version = "0.5.2", features = ["steer"] }
tower-http = { version = "0.6.6", features = ["trace", "limit","auth"] }
tower_governor = "0.7.0"

# Prometheus 监控
axum-prometheus = "0.7.0"
prometheus = "0.13"
metrics = "0.23"
metrics-exporter-prometheus = "0.15"
dotenvy = "0.15.7"

tonic = {version = "0.14.0",features = ["tls-ring"] }
prost = "0.14.1"
dashmap = "6.1.0"
tonic-prost = "0.14.0"
hyper = "1.6.0"
anyhow = "1.0.98"
tonic-web = "0.14.0"

[build-dependencies]
tonic-prost-build= { version = "0.14.0" }
